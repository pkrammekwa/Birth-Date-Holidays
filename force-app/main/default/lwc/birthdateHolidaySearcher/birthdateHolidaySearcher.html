<template>
    <lightning-card title="South African ID Holiday Searcher" icon-name="standard:search">
        <div class="slds-p-around_medium">
            <section class="info-section">
                <h2 class="title">Search public holidays based on ID Number birth date</h2>
                <p class="description">
                    Enter a South African ID Number to check whether any important public holidays
                    fall on an ID Number date of birth.
                </p>
            </section>

            <lightning-input
                type="text"
                name="idNumber"
                label="South African ID Number"
                value={idNumber}
                placeholder="Example: 9001015009087"
                message-when-value-missing="Please enter a South African ID Number."
                onchange={handleIdNumberChange}
                maxlength="13"
                required>
            </lightning-input>

            <template if:true={errorMessage}>
                <div class="error-message" role="alert">
                    {errorMessage}
                </div>
            </template>

            <template if:true={successMessage}>
                <div class="success-message" role="status">
                    {successMessage}
                </div>
            </template>

            <div class="actions">
                <lightning-button
                    label="Search"
                    variant="brand"
                    onclick={handleSearch}
                    class="search-button">
                </lightning-button>

                <lightning-button
                    label="Clear"
                    variant="neutral"
                    onclick={handleClear}
                    class="clear-button">
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
