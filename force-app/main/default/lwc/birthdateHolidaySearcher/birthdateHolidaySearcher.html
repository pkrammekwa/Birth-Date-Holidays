<template>
    <lightning-card title="Birthdate Holiday Searcher" icon-name="standard:search">
        <div class="slds-p-around_medium">
            <section class="info-section">
                <h2 class="title">Check public holidays on your date of birth</h2>
                <p class="description">
                    Enter your South African ID Number to check whether any important public holidays
                    fall on your date of birth. The ID Number will first be validated and decoded into
                    its relevant information.
                </p>
            </section>

            <lightning-input
                type="text"
                name="idNumber"
                label="South African ID Number"
                value={idNumber}
                placeholder="Example: 9001015009087"
                message-when-value-missing="Please enter a South African ID Number."
                onchange={handleIdNumberChange}
                maxlength="13"
                required>
            </lightning-input>

            <template if:true={validationMessage}>
                <div class={validationMessageClass} role="alert">
                    {validationMessage}
                </div>
            </template>

            <template if:true={decodedIdDetails}>
                <div class="decoded-section">
                    <h3 class="decoded-title">Decoded ID Information</h3>

                    <dl class="decoded-list">
                        <div class="decoded-row">
                            <dt>Date of Birth</dt>
                            <dd>{decodedIdDetails.dateOfBirth}</dd>
                        </div>

                        <div class="decoded-row">
                            <dt>Gender</dt>
                            <dd>{decodedIdDetails.gender}</dd>
                        </div>

                        <div class="decoded-row">
                            <dt>Citizenship</dt>
                            <dd>{decodedIdDetails.citizenship}</dd>
                        </div>
                    </dl>
                </div>
            </template>

            <div class="actions">
                <lightning-button
                    label="Search"
                    variant="brand"
                    onclick={handleSearch}
                    disabled={isSearchDisabled}
                    class="search-button">
                </lightning-button>

                <lightning-button
                    label="Clear"
                    variant="neutral"
                    onclick={handleClear}
                    class="clear-button">
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
